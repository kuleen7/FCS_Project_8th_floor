services:
  - type: web
    name: secure-job-platform-api
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: DEBUG
        value: "False"
      - key: USE_SSL
        value: "False"
      - key: LOG_LEVEL
        value: "INFO"
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "30"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "7"
      - key: OTP_EXPIRE_MINUTES
        value: "5"
      - key: OTP_LENGTH
        value: "6"
      - key: SECRET_KEY
        generateValue: true
      - key: OTP_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      - key: SMTP_SERVER
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM_EMAIL
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
